apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kitten
  namespace: default
spec:
  interval: 120m
  chart:
    spec:
      chart: app
      version: "0.2.0"
      sourceRef:
        kind: HelmRepository
        name: vibioh
      interval: 120m
  install:
    crds: Skip
  maxHistory: 3
  upgrade:
    remediation:
      retries: 3
  rollback:
    cleanupOnFail: true
  values:
    nameOverride: kitten
    image:
      name: rg.fr-par.scw.cloud/vibioh/kitten
      tag: "202603312046" # {"$imagepolicy": "default:flux-kitten-api:tag"}
    labels:
      tags.datadoghq.com/env: "production"
      tags.datadoghq.com/service: "kitten"
      tags.datadoghq.com/version: "202603312046" # {"$imagepolicy": "default:flux-kitten-api:tag"}
    env:
      - name: GOMEMLIMIT
        valueFrom:
          resourceFieldRef:
            resource: limits.memory
      - name: VERSION
        valueFrom:
          fieldRef:
            fieldPath: metadata.labels['tags.datadoghq.com/version']
      - name: OTEL_SERVICE_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.labels['tags.datadoghq.com/service']
    config:
      KITTEN_DISCORD_APPLICATION_ID: "959191057835393044"
      KITTEN_DISCORD_PUBLIC_KEY: 2a1eb3b4786bc5dbd59d1f8d35eb44f5243e959158ae75367f57e0d4f169ba47
      KITTEN_LOGGER_JSON: "true"
      KITTEN_PPROF_AGENT: http://datadog.observability:8126
      KITTEN_REDIS_ADDRESS: redis:6379
      KITTEN_REDIS_DATABASE: "3"
      KITTEN_SLACK_CLIENT_ID: "2426300949335.3310973634019"
      KITTEN_TELEMETRY_URL: datadog.observability:4317
      OTEL_RESOURCE_ATTRIBUTES: env=production,git.repository_url=github.com/ViBiOh/kitten
    secrets:
      KITTEN_DISCORD_CLIENT_ID: 
      KITTEN_DISCORD_CLIENT_SECRET: 
      KITTEN_KLIPY_API_KEY: 
      KITTEN_REDIS_PASSWORD: 
      KITTEN_SLACK_CLIENT_SECRET: 
      KITTEN_SLACK_SIGNING_SECRET: 
      KITTEN_UNSPLASH_ACCESS_KEY: 
    resources:
      requests:
        cpu: 500m
        memory: 128Mi
      limits:
        memory: 128Mi
    securityContext:
      runAsGroup: 1000
      runAsUser: 1000
    volumes:
      - name: tmp
        emptyDir: {}
    volumeMounts:
      - name: tmp
        mountPath: /tmp
    autoscaling:
      enabled: false
    ingress:
      enabled: true
      compress: true
      tls:
        enabled: true
      hosts:
        - kitten.vibioh.fr
    initContainers:
      - name: discord
        image: rg.fr-par.scw.cloud/vibioh/chatpotte:202603251306 # {"$imagepolicy": "default:flux-chatpotte-web"}
        imagePullPolicy: Always
        env:
          - name: DISCORD_APPLICATION_ID
            valueFrom:
              configMapKeyRef:
                name: kitten
                key: KITTEN_DISCORD_APPLICATION_ID
          - name: DISCORD_PUBLIC_KEY
            valueFrom:
              configMapKeyRef:
                name: kitten
                key: KITTEN_DISCORD_PUBLIC_KEY
          - name: DISCORD_LOGGER_JSON
            value: "true"
          - name: DISCORD_COMMANDS
            value: |
              {
                "meme": {
                  "name": "meme",
                  "description": "Generate a meme with caption from Unsplash",
                  "options": [
                    {
                      "name": "search",
                      "description": "Searched image",
                      "type": 3,
                      "required": true
                    },
                    {
                      "name": "caption",
                      "description": "Caption to add",
                      "type": 3,
                      "required": true
                    }
                  ]
                },
                "memedi": {
                  "name": "memedi",
                  "description": "Generate a meme with caption from Unsplash Image ID",
                  "options": [
                    {
                      "name": "id",
                      "description": "Image ID",
                      "type": 3,
                      "required": true
                    },
                    {
                      "name": "caption",
                      "description": "Caption to add",
                      "type": 3,
                      "required": true
                    }
                  ]
                },
                "memegif": {
                  "name": "memegif",
                  "description": "Generate a gif with caption from Klipy",
                  "options": [
                    {
                      "name": "search",
                      "description": "Searched image",
                      "type": 3,
                      "required": true
                    },
                    {
                      "name": "caption",
                      "description": "Caption to add",
                      "type": 3,
                      "required": true
                    }
                  ]
                }
              }
          - name: DISCORD_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: kitten
                key: KITTEN_DISCORD_CLIENT_ID
          - name: DISCORD_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: kitten
                key: KITTEN_DISCORD_CLIENT_SECRET
        resources:
          limits:
            memory: 64Mi
          requests:
            cpu: 100m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
